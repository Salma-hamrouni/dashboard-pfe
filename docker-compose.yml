version: "3.9"

services:

  # ── MySQL Database ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: dashboard_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"   # expose on 3307 to avoid conflict with local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Dashboard API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Override connection string to point to the Docker MySQL service
      ConnectionStrings__DefaultConnection: >-
        Server=db;Port=3306;Database=${MYSQL_DATABASE};
        User=${MYSQL_USER};Password=${MYSQL_PASSWORD};
        CharSet=utf8mb4;
      # JWT — set a strong secret in .env
      Jwt__Key:    ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-DashboardAPI}
      # Gemini AI
      Gemini__ApiKey: ${GEMINI_API_KEY}
      # ASP.NET Core
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - api_uploads:/app/Uploads
      - api_logs:/app/logs

volumes:
  mysql_data:
  api_uploads:
  api_logs:
